<body>

<nav>

  </div>

<div class="page-header">
  <h1>Barnsley Fern</h1>
  <div class="subtitle">Four rules · 24 numbers · one plant</div>
</div>

<div class="main-layout">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="panel">

    <div>
      <div class="panel-section-title">Presets</div>
      <div class="preset-grid">
        <button class="preset-btn active" data-key="fern">Classic Fern</button>
        <button class="preset-btn" data-key="tree">Tree</button>
        <button class="preset-btn" data-key="coral">Coral</button>
        <button class="preset-btn" data-key="spiral">Spiral</button>
        <button class="preset-btn" data-key="thorn">Thorn</button>
        <button class="preset-btn" data-key="cyclosorus">Cyclosorus</button>
      </div>
    </div>

    <div>
      <div class="panel-section-title">Shape</div>
      <div class="slider-row">
        <div class="slider-label"><span>Lean</span><span id="leanVal">0.00</span></div>
        <input type="range" id="leanSlider" min="-0.2" max="0.2" step="0.01" value="0">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Curl</span><span id="curlVal">0.00</span></div>
        <input type="range" id="curlSlider" min="-0.2" max="0.2" step="0.01" value="0">
      </div>
    </div>

    <button class="begin-btn" id="beginBtn">▶ Begin</button>

  </div>
</div>

<div class="info-text">
  Each dot placed by one of four rules, chosen randomly.<br>
  Change a preset — watch 24 numbers grow a new plant.
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = Math.min(390, window.innerWidth - 40);
const H = Math.round(W * 1.4);
canvas.width = W;
canvas.height = H;

const PRESETS = {
  fern:      { rules: [
    { w:1,  a:0,     b:0,     c:0,     d:0.16,  e:0,     f:0     },
    { w:85, a:0.85,  b:0.04,  c:-0.04, d:0.85,  e:0,     f:1.60  },
    { w:7,  a:0.20,  b:-0.26, c:0.23,  d:0.22,  e:0,     f:1.60  },
    { w:7,  a:-0.15, b:0.28,  c:0.26,  d:0.24,  e:0,     f:0.44  },
  ]},
  tree:      { rules: [
    { w:10, a:0,    b:0,     c:0,     d:0.5,  e:0,  f:0   },
    { w:40, a:0.42, b:-0.42, c:0.42,  d:0.42, e:0,  f:0.2 },
    { w:40, a:0.42, b:0.42,  c:-0.42, d:0.42, e:0,  f:0.2 },
    { w:10, a:0.1,  b:0,     c:0,     d:0.1,  e:0,  f:0.2 },
  ]},
  coral:     { rules: [
    { w:2,  a:0,     b:0,     c:0,      d:0.25, e:0,      f:-0.4 },
    { w:84, a:0.95,  b:0.005, c:-0.005, d:0.93, e:-0.002, f:0.5  },
    { w:7,  a:0.035, b:-0.2,  c:0.16,   d:0.04, e:-0.09,  f:0.02 },
    { w:7,  a:-0.04, b:0.2,   c:0.16,   d:0.04, e:0.083,  f:0.12 },
  ]},
  spiral:    { rules: [
    { w:5,  a:0,      b:0,      c:0,     d:0.4,   e:0,     f:0      },
    { w:75, a:0.787,  b:-0.234, c:0.193, d:0.724, e:1.6,   f:-0.376 },
    { w:10, a:0.121,  b:-0.256, c:0.306, d:0.216, e:0.627, f:1.383  },
    { w:10, a:-0.121, b:0.257,  c:0.306, d:0.216, e:-0.39, f:1.384  },
  ]},
  thorn:     { rules: [
    { w:3,  a:0,     b:0,    c:0,    d:0.5,  e:0, f:0   },
    { w:74, a:0.77,  b:0.1,  c:-0.1, d:0.77, e:0, f:1.8 },
    { w:13, a:0.37,  b:-0.3, c:0.3,  d:0.37, e:0, f:0.4 },
    { w:10, a:-0.37, b:0.3,  c:0.3,  d:0.37, e:0, f:0.5 },
  ]},
  cyclosorus:{ rules: [
    { w:2,  a:0,     b:0,     c:0,      d:0.25, e:0,      f:-0.14  },
    { w:84, a:0.95,  b:0.005, c:-0.005, d:0.93, e:-0.002, f:0.5    },
    { w:7,  a:0.035, b:-0.11, c:0.27,   d:0.01, e:-0.05,  f:0.005  },
    { w:7,  a:-0.04, b:0.11,  c:0.27,   d:0.01, e:0.047,  f:0.06   },
  ]},
};

let currentPreset = 'fern';
let rules = JSON.parse(JSON.stringify(PRESETS.fern.rules));
let animId = null;
let slowGrow = false;
let hasDrawnOnce = false;

const leanSlider = document.getElementById('leanSlider');
const curlSlider = document.getElementById('curlSlider');
const leanValEl  = document.getElementById('leanVal');
const curlValEl  = document.getElementById('curlVal');
const beginBtn   = document.getElementById('beginBtn');

let leanOffset = 0, curlOffset = 0;

function updateSliderDisplay() {
  leanOffset = parseFloat(leanSlider.value);
  curlOffset = parseFloat(curlSlider.value);
  leanValEl.textContent = leanOffset.toFixed(2);
  curlValEl.textContent = curlOffset.toFixed(2);
}

leanSlider.addEventListener('input', () => { updateSliderDisplay(); slowGrow = false; startGrow(); });
curlSlider.addEventListener('input', () => { updateSliderDisplay(); slowGrow = false; startGrow(); });

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPreset = btn.dataset.key;
    rules = JSON.parse(JSON.stringify(PRESETS[currentPreset].rules));
    leanSlider.value = 0; curlSlider.value = 0;
    leanOffset = 0; curlOffset = 0;
    updateSliderDisplay();
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    slowGrow = false;
    startGrow();
  });
});

beginBtn.addEventListener('click', () => { slowGrow = !hasDrawnOnce; startGrow(); });

function getBounds() {
  const total = rules.reduce((s, r) => s + r.w, 0);
  const thresh = []; let acc = 0;
  rules.forEach(r => { acc += r.w / total; thresh.push(acc); });
  let sx = 0, sy = 0;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (let i = 0; i < 8000; i++) {
    const rnd = Math.random();
    let ri = 0; while (ri < 3 && rnd > thresh[ri]) ri++;
    const r = rules[ri];
    const nx = r.a * sx + r.b * sy + r.e;
    const ny = r.c * sx + r.d * sy + r.f;
    sx = nx; sy = ny;
    if (i > 50) {
      if (sx < minX) minX = sx; if (sx > maxX) maxX = sx;
      if (sy < minY) minY = sy; if (sy > maxY) maxY = sy;
    }
  }
  return { minX, maxX, minY, maxY };
}

function startGrow() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }

  beginBtn.disabled = true;
  beginBtn.textContent = 'Growing…';

  ctx.fillStyle = '#06060a';
  ctx.fillRect(0, 0, W, H);

  const { minX, maxX, minY, maxY } = getBounds();
  const margin = 18;
  const scaleX = (W - margin * 2) / (maxX - minX || 1);
  const scaleY = (H - margin * 2) / (maxY - minY || 1);
  const scale  = Math.min(scaleX, scaleY);
  const offX   = margin + (W - margin * 2 - (maxX - minX) * scale) / 2 - minX * scale;
  const offY   = H - margin - minY * scale;

  const total = rules.reduce((s, r) => s + r.w, 0);
  const thresh = []; let acc = 0;
  rules.forEach(r => { acc += r.w / total; thresh.push(acc); });

  const colors = [
    [140, 210, 100],
    [55,  175,  75],
    [95,  215, 115],
    [75,  195,  85],
  ];

  const TOTAL   = 180000;
  const PH1_DUR = 1500;   // ms slow drip
  const PH2_DUR = 1250;   // ms ramp
  const PH1_PPS = 60;
  const PH2_PPS = 700;
  const PH3_PPS = 7000;

  let sx = 0, sy = 0, drawn = 0, startTs = null;

  function frame(ts) {
    if (!startTs) startTs = ts;
    const elapsed = ts - startTs;

    let pps;
    if (!slowGrow) {
      pps = PH3_PPS;
    } else if (elapsed < PH1_DUR) {
      pps = PH1_PPS;
    } else if (elapsed < PH1_DUR + PH2_DUR) {
      const t = (elapsed - PH1_DUR) / PH2_DUR;
      pps = PH1_PPS + (PH2_PPS - PH1_PPS) * t;
    } else {
      pps = PH3_PPS;
    }

    const n = Math.round(pps);
    for (let i = 0; i < n && drawn < TOTAL; i++) {
      const rnd = Math.random();
      let ri = 0; while (ri < 3 && rnd > thresh[ri]) ri++;
      const r = rules[ri];
      const nx = r.a * sx + (r.b + leanOffset) * sy + r.e;
      const ny = (r.c + curlOffset) * sx + r.d * sy + r.f;
      sx = nx; sy = ny;
      drawn++;

      const px = Math.round(sx * scale + offX);
      const py = Math.round(H - (sy * scale + (H - offY)));
      if (px >= 0 && px < W && py >= 0 && py < H) {
        const alpha = 0.65 + (sy / (maxY || 1)) * 0.35;
        const [red, green, blue] = colors[ri];
        ctx.fillStyle = `rgba(${red},${green},${blue},${Math.min(1, alpha)})`;
        ctx.fillRect(px, py, 1, 1);
      }
    }

    if (drawn < TOTAL) {
      animId = requestAnimationFrame(frame);
    } else {
      animId = null;
      hasDrawnOnce = true;
      beginBtn.disabled = false;
      beginBtn.textContent = '▶ Begin';
    }
  }

  animId = requestAnimationFrame(frame);
}

// Init — blank canvas, wait for Begin
ctx.fillStyle = '#06060a';
ctx.fillRect(0, 0, W, H);
updateSliderDisplay();
</script>
</body>
