<h1>Sierpinski Triangle</h1>
<div class="subtitle">A simple rule. An impossible result.</div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div id="message">Press Begin to start</div>
<div id="counter"></div>
<div class="btn-row">
  <button id="btnBegin" class="primary">Begin</button>
  <button id="btnReset" disabled>Reset</button>
  <button id="btnSkip" disabled>Skip to reveal</button>
  <button id="btnMode">Mode: Random</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const msg    = document.getElementById('message');
const ctr    = document.getElementById('counter');
const btnBegin = document.getElementById('btnBegin');
const btnReset = document.getElementById('btnReset');
const btnSkip  = document.getElementById('btnSkip');

const W = Math.min(520, window.innerWidth - 20);
const H = Math.round(W * 0.88);
canvas.width = W; canvas.height = H;
document.documentElement.style.setProperty('--cw', W + 'px');

const PAD = 44;
const VNAMES = ['A','B','C'];
const VCOLS  = ['#ff6655','#44aaff','#aaff66'];

// World-space vertices (fixed)
let verts;
function initVerts() {
  verts = [
    {x: W/2,     y: PAD + 10},
    {x: PAD,     y: H - PAD},
    {x: W - PAD, y: H - PAD}
  ];
}

// Current view transform: world -> screen
// screen = (world - origin) * scale + offset
let view = {ox: W/2, oy: H/2, scale: 1};

function worldToScreen(wx, wy) {
  return {
    x: (wx - view.ox) * view.scale + W/2,
    y: (wy - view.oy) * view.scale + H/2
  };
}

// Dot accumulator in WORLD space stored as typed arrays for speed
let dotsX = new Float32Array(2000000);
let dotsY = new Float32Array(2000000);
let dotsC = new Uint8Array(2000000);  // 0,1,2
let dotCount = 0;

let pt = {x:0, y:0};
let phase = 'idle';
let skipRequested = false;
let useRandom = true;
let seqIdx = 0;

function pickVertex() {
  if(useRandom) return Math.floor(Math.random()*3);
  return seqIdx++ % 3;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function lerp(a,b,t){ return a+(b-a)*t; }

// ── RENDERING ────────────────────────────────────────────────────────────
function renderAll(vertAlpha=1, highlight=-1) {
  ctx.fillStyle = '#06060a';
  ctx.fillRect(0,0,W,H);

  // draw accumulated dots
  for(let i=0; i<dotCount; i++) {
    const s = worldToScreen(dotsX[i], dotsY[i]);
    if(s.x < -1 || s.x > W+1 || s.y < -1 || s.y > H+1) continue;
    ctx.fillStyle = VCOLS[dotsC[i]];
    ctx.fillRect(Math.round(s.x), Math.round(s.y), 1, 1);
  }

  // triangle outline
  if(vertAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = vertAlpha;
    ctx.strokeStyle = '#1e1e30';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const sv = verts.map(v => worldToScreen(v.x, v.y));
    ctx.moveTo(sv[0].x, sv[0].y);
    ctx.lineTo(sv[1].x, sv[1].y);
    ctx.lineTo(sv[2].x, sv[2].y);
    ctx.closePath();
    ctx.stroke();

    // vertices
    verts.forEach((v,i) => {
      const s = worldToScreen(v.x, v.y);
      const r = (i === highlight) ? 10 : 6;
      ctx.fillStyle = VCOLS[i];
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI*2);
      ctx.fill();
      ctx.font = '600 11px JetBrains Mono';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const ox = [0, -14, 14][i];
      const oy = [-14, 10, 10][i];
      ctx.fillText(VNAMES[i], s.x + ox, s.y + oy);
    });
    ctx.restore();
  }
}

function drawDot(wx, wy, col, r=2.5) {
  const s = worldToScreen(wx, wy);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI*2);
  ctx.fill();
}

function addDot(vi) {
  const v = verts[vi];
  pt.x = lerp(pt.x, v.x, 0.5);
  pt.y = lerp(pt.y, v.y, 0.5);
  if(dotCount < dotsX.length) {
    dotsX[dotCount] = pt.x;
    dotsY[dotCount] = pt.y;
    dotsC[dotCount] = vi;
    dotCount++;
  }
}

function addDots(n) {
  for(let i=0; i<n; i++) addDot(pickVertex());
}

function storeDot(x, y, vi) {
  if(dotCount < dotsX.length) {
    dotsX[dotCount] = x;
    dotsY[dotCount] = y;
    dotsC[dotCount] = vi;
    dotCount++;
  }
}

function addDots(n) {
  for(let i=0; i<n; i++) addDot(pickVertex());
}

// ── SMOOTH ZOOM ───────────────────────────────────────────────────────────
// Animate view.ox, view.oy, view.scale toward target while adding dots
async function zoomTo(targetOx, targetOy, targetScale, frames, dotsPerFrame, message) {
  if(message) msg.textContent = message;
  const startOx = view.ox, startOy = view.oy, startScale = view.scale;
  for(let f=0; f<=frames; f++) {
    const t = f/frames;
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    view.ox    = lerp(startOx,    targetOx,    ease);
    view.oy    = lerp(startOy,    targetOy,    ease);
    view.scale = lerp(startScale, targetScale, ease);
    addDots(dotsPerFrame);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(20);
  }
}

// ── ACT 1: teach the rule ─────────────────────────────────────────────────
async function act1() {
  phase = 'teaching';
  view = {ox: W/2, oy: H/2, scale: 1};
  renderAll(1);
  msg.textContent = 'Three vertices: A, B, C';
  await sleep(3300);

  pt = {x: W*0.52, y: H*0.57};
  msg.textContent = 'Place a dot anywhere inside the triangle';
  renderAll(1);
  drawDot(pt.x, pt.y, '#ffffff');
  await sleep(3300);

  for(let s=0; s<3; s++) {
    if(skipRequested) { view={ox:W/2,oy:H/2,scale:1}; await fastFill(); return; }
    const vi = pickVertex();
    const v  = verts[vi];

    msg.textContent = useRandom
      ? `Pick a random vertex — it's ${VNAMES[vi]}`
      : `Next vertex in sequence — it's ${VNAMES[vi]}`;
    renderAll(1, vi);
    drawDot(pt.x, pt.y, '#ffffff', 2.5);
    await sleep(2700);
    if(skipRequested) { view={ox:W/2,oy:H/2,scale:1}; await fastFill(); return; }

    msg.textContent = `Draw a line to vertex ${VNAMES[vi]}`;
    renderAll(1, vi);
    const spt = worldToScreen(pt.x, pt.y);
    const sv  = worldToScreen(v.x, v.y);
    ctx.save();
    ctx.setLineDash([4,5]);
    ctx.strokeStyle = VCOLS[vi];
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(spt.x, spt.y); ctx.lineTo(sv.x, sv.y); ctx.stroke();
    ctx.restore();
    drawDot(pt.x, pt.y, '#ffffff', 2.5);
    await sleep(2700);
    if(skipRequested) { view={ox:W/2,oy:H/2,scale:1}; await fastFill(); return; }

    msg.textContent = 'Move exactly halfway along that line';
    await sleep(2500);
    const nx = lerp(pt.x, v.x, 0.5);
    const ny = lerp(pt.y, v.y, 0.5);
    const startX = pt.x, startY = pt.y;
    const FRAMES = 36;
    for(let f=0; f<=FRAMES; f++) {
      const t = f/FRAMES;
      const cx = lerp(startX, nx, t);
      const cy = lerp(startY, ny, t);
      renderAll(1, vi);
      const sStart = worldToScreen(startX, startY);
      const sMid   = worldToScreen(nx, ny);
      const sEnd   = worldToScreen(v.x, v.y);
      ctx.save();
      ctx.lineWidth = 1;
      ctx.strokeStyle = VCOLS[vi];
      ctx.globalAlpha = 0.6;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(sStart.x, sStart.y); ctx.lineTo(worldToScreen(cx,cy).x, worldToScreen(cx,cy).y); ctx.stroke();
      ctx.strokeStyle = '#ffffff';
      ctx.globalAlpha = 0.15;
      ctx.setLineDash([4,5]);
      ctx.beginPath(); ctx.moveTo(worldToScreen(cx,cy).x, worldToScreen(cx,cy).y); ctx.lineTo(sEnd.x, sEnd.y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      const angle = Math.atan2(sEnd.y - sStart.y, sEnd.x - sStart.x) + Math.PI/2;
      ctx.save();
      ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = 0.6; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sMid.x + Math.cos(angle)*6, sMid.y + Math.sin(angle)*6);
      ctx.lineTo(sMid.x - Math.cos(angle)*6, sMid.y - Math.sin(angle)*6);
      ctx.stroke();
      ctx.restore();
      drawDot(cx, cy, VCOLS[vi], 3);
      await sleep(18);
    }

    // dot is now at nx,ny — freeze it there with the full line visible
    pt = {x: nx, y: ny};
    const sStart2 = worldToScreen(startX, startY);
    const sMid2   = worldToScreen(nx, ny);
    const sEnd2   = worldToScreen(v.x, v.y);
    const angle2  = Math.atan2(sEnd2.y - sStart2.y, sEnd2.x - sStart2.x) + Math.PI/2;

    msg.textContent = `Halfway. The dot stops here — and stays.`;
    renderAll(1, vi);
    ctx.save();
    ctx.lineWidth = 1;
    ctx.strokeStyle = VCOLS[vi]; ctx.globalAlpha = 0.6; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(sStart2.x, sStart2.y); ctx.lineTo(sMid2.x, sMid2.y); ctx.stroke();
    ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = 0.15; ctx.setLineDash([4,5]);
    ctx.beginPath(); ctx.moveTo(sMid2.x, sMid2.y); ctx.lineTo(sEnd2.x, sEnd2.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = 0.7; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sMid2.x + Math.cos(angle2)*6, sMid2.y + Math.sin(angle2)*6);
    ctx.lineTo(sMid2.x - Math.cos(angle2)*6, sMid2.y - Math.sin(angle2)*6);
    ctx.stroke();
    ctx.restore();
    drawDot(nx, ny, VCOLS[vi], 5);
    await sleep(3900);
    storeDot(pt.x, pt.y, vi);
    const finalMsg = s < 2
      ? `Dot ${s+1} placed. Now pick another ${useRandom ? 'random' : 'sequential'} vertex and repeat`
      : useRandom
        ? `That's the rule. Random vertex → jump halfway → leave the dot. That's all. Now watch.`
        : `That's the rule. Sequential vertex → jump halfway → leave the dot. Now watch what happens.`;
    msg.textContent = finalMsg;
    renderAll(1);
    drawDot(pt.x, pt.y, VCOLS[vi], 2.5);
    await sleep(s < 2 ? 2500 : 3300);
  }

  await act2();
}

// ── ACT 2: fill triangle with crescendo, no zoom ─────────────────────────
async function act2() {
  phase = 'building';
  btnSkip.disabled = true;

  if(!useRandom) { await act2deterministic(); return; }

  msg.textContent = 'One dot at a time...';
  for(let i=0; i<80; i++) {
    addDots(1);
    renderAll(1);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(80);
  }

  msg.textContent = 'Picking up speed...';
  for(let i=0; i<100; i++) {
    addDots(4);
    renderAll(1);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(40);
  }

  msg.textContent = 'A shape is emerging.';
  for(let i=0; i<120; i++) {
    addDots(15);
    const alpha = Math.max(0, 1 - i/120);
    renderAll(alpha);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(20);
  }

  for(let i=0; i<150; i++) {
    addDots(80);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }

  msg.textContent = 'A triangle is appearing. But look closer.';
  await sleep(2600);
  await act3();
}

async function act2deterministic() {
  seqIdx = 0;
  msg.textContent = 'The Sierpinski Triangle randomly picks vertices. This time we pick them in sequence (A, B, C, A, B, C...)';
  await sleep(2800);

  for(let i=0; i<120; i++) {
    addDots(1);
    renderAll(1);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(60);
  }

  msg.textContent = 'No randomness. No fractal.';
  await sleep(1400);

  for(let i=0; i<200; i++) {
    addDots(10);
    const alpha = Math.max(0, 1 - i/200);
    renderAll(alpha);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }

  msg.textContent = 'Same rule, same sequence — the dots keep landing in the same places.';
  await sleep(2000);

  for(let i=0; i<100; i++) {
    addDots(50);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }

  msg.textContent = 'A fixed geometric orbit. The randomness was everything.';
  await sleep(3000);
  phase = 'running';
  runForever();
}

async function fastFill() {
  phase = 'building';
  msg.textContent = 'Filling...';
  btnSkip.disabled = true;
  addDots(8000);
  renderAll(0);
  ctr.textContent = dotCount.toLocaleString() + ' dots';
  await act3();
}

// ── ACT 3: zoom into corners progressively ───────────────────────────────
async function act3() {
  phase = 'zooming';

  // Center of bottom-left sub-triangle (1/4 point)
  const bL = verts[1];  // bottom-left vertex
  const cent = {x: W/2, y: H/2 - PAD*0.3};

  // zoom level 1: into bottom-left quadrant
  const z1cx = lerp(bL.x, cent.x, 0.35);
  const z1cy = lerp(bL.y, cent.y, 0.35);
  await zoomTo(z1cx, z1cy, 2.8, 80, 1000,
    'Zoom in on one corner...');
  await sleep(600);

  msg.textContent = 'The same pattern emerging again inside';
  for(let i=0; i<60; i++) {
    addDots(2000);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }
  await sleep(600);

  const z2cx = lerp(bL.x, z1cx, 0.38);
  const z2cy = lerp(bL.y, z1cy, 0.38);
  await zoomTo(z2cx, z2cy, 8.5, 90, 2000,
    'Zoom in again...');
  await sleep(400);

  msg.textContent = 'Still the same. Another Sierpinski inside the last.';
  for(let i=0; i<60; i++) {
    addDots(3000);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }
  await sleep(600);

  const z3cx = lerp(bL.x, z2cx, 0.4);
  const z3cy = lerp(bL.y, z2cy, 0.4);
  await zoomTo(z3cx, z3cy, 24, 100, 3000,
    'And again...');
  await sleep(400);

  msg.textContent = 'The fractal builds itself. Always the same pattern, always deeper. An interesting geometrical order — from nothing but a coin flip and a ruler.';
  for(let i=0; i<60; i++) {
    addDots(4000);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }
  await sleep(6000);

  phase = 'running';
  msg.textContent = 'Now you\'ve seen it — does the random vertex selection actually matter? Hit Reset, switch to Sequential mode, and find out.';
  runForever();
}

async function runForever() {
  while(phase === 'running') {
    addDots(3000);
    renderAll(0);
    ctr.textContent = dotCount.toLocaleString() + ' dots';
    await sleep(16);
  }
}

// ── RESET ─────────────────────────────────────────────────────────────────
function reset() {
  phase = 'idle';
  skipRequested = false;
  seqIdx = 0;
  dotCount = 0;
  pt = {x:0, y:0};
  view = {ox: W/2, oy: H/2, scale: 1};
  initVerts();
  ctx.fillStyle = '#06060a';
  ctx.fillRect(0,0,W,H);
  renderAll(1);
  msg.textContent = 'Press Begin to start';
  ctr.textContent = '';
  btnBegin.disabled = false;
  btnReset.disabled = true;
  btnSkip.disabled  = true;
}

btnBegin.addEventListener('click', () => {
  btnBegin.disabled = false;
  btnReset.disabled = false;
  btnSkip.disabled  = false;
  skipRequested = false;
  dotCount = 0;
  pt = {x: W*0.52, y: H*0.57};
  view = {ox: W/2, oy: H/2, scale: 1};
  initVerts();
  ctx.fillStyle = '#06060a';
  ctx.fillRect(0,0,W,H);
  btnBegin.disabled = true;
  act1();
});

btnSkip.addEventListener('click', () => { skipRequested = true; });
btnReset.addEventListener('click', reset);

document.getElementById('btnMode').addEventListener('click', function() {
  useRandom = !useRandom;
  seqIdx = 0;
  this.textContent = useRandom ? 'Mode: Random' : 'Mode: Sequential';
  this.classList.toggle('primary', !useRandom);
});

initVerts();
renderAll(1);
</script>
